apiVersion: apps/v1
kind: Deployment
metadata:
  name: grpc-virtual-thread-server
  labels:
    app: grpc-virtual-thread-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grpc-virtual-thread-server
  template:
    metadata:
      labels:
        app: grpc-virtual-thread-server
    spec:
      containers:
        - name: grpc-virtual-thread-server
          image: grpc-virtual-thread-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 9090
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-Djdk.tracePinnedThreads=full"
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: "4000m"
              memory: "1Gi"
            limits:
              cpu: "6000m"
              memory: "2Gi"
      volumes:
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grpc-virtual-thread-server
  labels:
    app: grpc-virtual-thread-server
spec:
  selector:
    app: grpc-virtual-thread-server
  ports:
    - name: grpc
      port: 9090
      targetPort: 9090
